name: Container image

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden the runner (deny-by-default egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            auth.docker.io:443
            registry-1.docker.io:443
            production.cloudflare.docker.com:443
            *.docker.io:443
            *.docker.com:443
            *.cloudflarestorage.com:443
            *.r2.cloudflarestorage.com:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Login to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "${GHCR_TOKEN}" | docker login "${REGISTRY}" --username "${GITHUB_ACTOR}" --password-stdin
      - name: Build container image
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          docker build \
            --pull \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}" \
            --tag "${image}:${GITHUB_SHA}" \
            --tag "${image}:latest" \
            .
      - name: Publish container image
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          docker push "${image}:${GITHUB_SHA}"
          docker push "${image}:latest"
