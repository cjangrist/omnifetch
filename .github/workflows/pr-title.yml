name: PR title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main]

permissions: {}

jobs:
  conventional-title:
    name: PR title
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (deny-by-default egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            *.actions.githubusercontent.com:443
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate PR title (gitmoji + Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python3 .github/scripts/check_conventional_title.py
