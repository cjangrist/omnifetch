name: Code scanning gate

# Fail the build when CodeQL has open alerts at or above the merge-protection
# threshold (security severity high+, or error-level). Complements the
# `code-scanning-merge-protection` ruleset with a visible red check, and runs a
# daily tripwire so a regression on `main` cannot sit unnoticed between scans.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 6 * * *" # daily safety net
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: CodeQL alert gate
    runs-on: ubuntu-latest
    permissions:
      security-events: read # read code scanning alerts
    steps:
      - name: Harden the runner (deny-by-default egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            *.actions.githubusercontent.com:443
      - name: Fail on open CodeQL alerts (security high+ or error)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --paginate \
            "repos/${REPO}/code-scanning/alerts?tool_name=CodeQL&state=open&per_page=100" \
            --jq '.[] | {sec: (.rule.security_severity_level // ""), sev: (.rule.severity // ""), rule: .rule.id, url: .html_url}' \
            > alerts.jsonl
          blocking="$(jq -s '[.[] | select(.sec == "high" or .sec == "critical" or .sev == "error")]' alerts.jsonl)"
          count="$(jq 'length' <<< "${blocking}")"
          echo "Open CodeQL alerts at/above threshold (security high+ or severity error): ${count}"
          if [ "${count}" -gt 0 ]; then
            jq -r '.[] | "::error::CodeQL \(.rule) (security=\(.sec), severity=\(.sev)) -> \(.url)"' <<< "${blocking}"
            echo "Resolve or dismiss them in the Security tab -> Code scanning, then re-run."
            exit 1
          fi
          echo "No blocking CodeQL alerts."
